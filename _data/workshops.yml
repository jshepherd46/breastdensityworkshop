# Past workshops — add new entry at the top after each event.
#
# Per entry:
#   number          required  Ordinal ("11th", "10th", ...)
#   year            required  Numeric year
#   location        required  Display location
#   venue           optional  Specific venue / hotel
#   dates           optional  e.g. "June 4–6, 2025"
#   program_url     optional  Path to the workshop's program PDF in this repo
#                             (under /assets/programs/) or to a public URL.
#                             Renders as a "Program (PDF)" button.
#   slides_url      optional  Link to the slide deck collection. Often points
#                             at a Drive/Dropbox folder with restricted
#                             access; renders as a "Slides" button.
#                             When neither program_url nor slides_url is
#                             set, the page shows "Materials forthcoming"
#                             rather than an empty card.

